configuration:
  log_level:
    name: Log level
    description: Controls how much detail the app writes to its log.
  scan_interval:
    name: Scan interval
    description: Number of seconds between Home Assistant updates.
  instance_1_program_policies:
    name: Instance 1 program policies
    description: Classify learned programs and set recommendation safeguards.
    fields:
      program:
        name: Program
      classification:
        name: Classification
      enabled:
        name: Enabled
      preference_rank:
        name: Preference rank
      allow_normal_recommendation:
        name: Allow normal recommendation
      allow_negative_price_run:
        name: Allow negative-price run
      minimum_days_between_runs:
        name: Minimum days between runs
      maximum_runs_per_window:
        name: Maximum runs per window
      estimated_overhead_cost_pence:
        name: Estimated overhead cost (pence)
  tariff_entity:
    name: Tariff entity
    description: Optional Home Assistant entity containing future energy prices.
  tariff_timezone:
    name: Tariff timezone
    description: Timezone used when the tariff feed contains local timestamps.
  tariff_price_unit:
    name: Tariff price unit
    description: Unit used by structured tariff values; ai_feed values are always pence per kWh.
  cost_search_hours:
    name: Cost search hours
    description: Number of future hours searched for candidate start times.
  cost_candidate_interval:
    name: Candidate interval
    description: Minutes between simulated candidate start times.
