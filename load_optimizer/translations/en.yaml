configuration:
  log_level:
    name: Log level
    description: Controls how much detail the app writes to its log.
  scan_interval:
    name: Scan interval
    description: Number of seconds between Home Assistant updates.
  instances_yaml:
    name: Scalable appliance instances
    description: Optional YAML or JSON list for three or more appliances. When populated, this overrides the legacy instance_ids and instance_N fields.
  reset_instance_ids:
    name: Reset instance IDs
    description: Optional comma-separated instance numbers to clear from app storage on next start. Clear this after use.
  tariff_entity:
    name: Tariff entity
    description: Optional single Home Assistant entity containing future energy prices. Use tariff entities for multiple sources.
  tariff_entities:
    name: Tariff entities
    description: Optional comma-separated Home Assistant entities containing future energy prices, such as current-day and next-day rate events.
  tariff_timezone:
    name: Tariff timezone
    description: Timezone used when the tariff feed contains local timestamps.
  tariff_price_unit:
    name: Tariff price unit
    description: Unit used by structured tariff values; ai_feed values are always pence per kWh.
  cost_search_hours:
    name: Cost search hours
    description: Number of future hours searched for candidate start times.
  cost_candidate_interval:
    name: Candidate interval
    description: Minutes between simulated candidate start times.
