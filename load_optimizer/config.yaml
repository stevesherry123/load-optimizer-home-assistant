name: Load Optimizer
version: "0.5.1"
slug: load_optimizer
description: Learn appliance cycles and find the most economical time and mode to run them.
url: https://github.com/stevesherry123/load-optimizer-home-assistant
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
homeassistant_api: true
watchdog: http://[HOST]:8099/health
ports:
  8099/tcp: null
options:
  log_level: info
  scan_interval: 60
  instance_1_name: Appliance 1
  instance_1_power_sensor: ""
  instance_1_energy_sensor: ""
  instance_1_program_sensor: ""
  instance_1_state_sensor: ""
  instance_1_active_power_threshold: 10
  instance_1_finish_delay: 5
  instance_1_program_policies: []
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  scan_interval: int(10,3600)
  instance_1_name: str
  instance_1_power_sensor: str
  instance_1_energy_sensor: str
  instance_1_program_sensor: str
  instance_1_state_sensor: str
  instance_1_active_power_threshold: float(0,100000)
  instance_1_finish_delay: int(1,120)
  instance_1_program_policies:
    - program: str
      classification: list(unclassified|preferred|alternative|maintenance|opportunistic|disabled)
      enabled: bool?
      preference_rank: int(1,100)?
      allow_normal_recommendation: bool?
      allow_negative_price_run: bool?
      minimum_days_between_runs: int(0,3650)?
      maximum_runs_per_window: int(0,20)?
      estimated_overhead_cost_pence: float(0,10000)?
