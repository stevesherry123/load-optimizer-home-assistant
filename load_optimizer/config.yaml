name: Load Optimizer
version: "0.8.15"
slug: load_optimizer
description: Learn appliance cycles and find the most economical time and mode to run them.
url: https://github.com/stevesherry123/load-optimizer-home-assistant
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
homeassistant_api: true
watchdog: http://[HOST]:8099/health
ports:
  8099/tcp: null
options:
  log_level: info
  scan_interval: 60
  instances_yaml: ""
  reset_instance_ids: ""
  tariff_entity: ""
  tariff_entities: ""
  tariff_timezone: Europe/London
  tariff_price_unit: p_per_kwh
  cost_search_hours: 24
  cost_forecast_hours: 12
  cost_forecast_interval: 30
  cost_candidate_interval: 5
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  scan_interval: int(10,3600)
  instances_yaml: str?
  reset_instance_ids: str
  tariff_entity: str
  tariff_entities: str
  tariff_timezone: str
  tariff_price_unit: list(p_per_kwh|gbp_per_kwh)
  cost_search_hours: int(1,72)
  cost_forecast_hours: int(1,72)
  cost_forecast_interval: int(5,60)
  cost_candidate_interval: int(1,30)
