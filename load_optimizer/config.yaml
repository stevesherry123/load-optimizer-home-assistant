name: Load Optimizer
version: "0.8.8"
slug: load_optimizer
description: Learn appliance cycles and find the most economical time and mode to run them.
url: https://github.com/stevesherry123/load-optimizer-home-assistant
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
homeassistant_api: true
watchdog: http://[HOST]:8099/health
ports:
  8099/tcp: null
options:
  log_level: info
  scan_interval: 60
  instances_yaml: ""
  instance_ids: "1"
  reset_instance_ids: ""
  instance_1_name: Appliance 1
  instance_1_power_sensor: ""
  instance_1_energy_sensor: ""
  instance_1_program_sensor: ""
  instance_1_state_sensor: ""
  instance_1_active_power_threshold: 10
  instance_1_finish_delay: 5
  instance_1_program_policies: []
  instance_2_name: Washing Machine 1
  instance_2_power_sensor: ""
  instance_2_energy_sensor: ""
  instance_2_program_sensor: ""
  instance_2_state_sensor: ""
  instance_2_active_power_threshold: 10
  instance_2_finish_delay: 5
  instance_2_program_policies: []
  tariff_entity: ""
  tariff_entities: ""
  tariff_timezone: Europe/London
  tariff_price_unit: p_per_kwh
  cost_search_hours: 24
  cost_candidate_interval: 5
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  scan_interval: int(10,3600)
  instances_yaml: str?
  instance_ids: str
  reset_instance_ids: str
  instance_1_name: str
  instance_1_power_sensor: str
  instance_1_energy_sensor: str
  instance_1_program_sensor: str
  instance_1_state_sensor: str
  instance_1_active_power_threshold: float(0,100000)
  instance_1_finish_delay: int(1,120)
  instance_1_program_policies:
    - program: str
      classification: list(unclassified|preferred|alternative|maintenance|opportunistic|disabled)
      enabled: bool?
      preference_rank: int(1,100)?
      allow_normal_recommendation: bool?
      allow_negative_price_run: bool?
      minimum_days_between_runs: int(0,3650)?
      maximum_runs_per_window: int(0,20)?
      estimated_overhead_cost_pence: float(0,10000)?
  instance_2_name: str
  instance_2_power_sensor: str
  instance_2_energy_sensor: str
  instance_2_program_sensor: str
  instance_2_state_sensor: str
  instance_2_active_power_threshold: float(0,100000)
  instance_2_finish_delay: int(1,120)
  instance_2_program_policies:
    - program: str
      classification: list(unclassified|preferred|alternative|maintenance|opportunistic|disabled)
      enabled: bool?
      preference_rank: int(1,100)?
      allow_normal_recommendation: bool?
      allow_negative_price_run: bool?
      minimum_days_between_runs: int(0,3650)?
      maximum_runs_per_window: int(0,20)?
      estimated_overhead_cost_pence: float(0,10000)?
  tariff_entity: str
  tariff_entities: str
  tariff_timezone: str
  tariff_price_unit: list(p_per_kwh|gbp_per_kwh)
  cost_search_hours: int(1,72)
  cost_candidate_interval: int(1,30)
