# Optional Home Assistant orchestration for Dishwasher 1.
#
# Load Optimizer remains the recommendation engine. These helpers and
# automations let dashboards, voice assistants, and household automations request
# a run without duplicating scheduling logic.
#
# Before using this package, replace the Bosch entity ids and
# `script.load_optimizer_announce` with the equivalents from your own Home
# Assistant instance.
#
# The announcement script should speak or notify the current value of
# `input_text.announce_text`, or you can replace both announcement actions with
# your own notification service.

input_select:
  load_optimizer_1_requested_mode:
    name: Dishwasher 1 Requested Mode
    icon: mdi:dishwasher
    options:
      - none
      - now
      - soon
      - overnight
    initial: none

input_text:
  load_optimizer_1_requested_program:
    name: Dishwasher 1 Requested Program
    icon: mdi:format-list-bulleted
    max: 64

  load_optimizer_1_scheduler_message:
    name: Dishwasher 1 Scheduler Message
    icon: mdi:message-text-outline
    max: 255

input_datetime:
  load_optimizer_1_requested_start:
    name: Dishwasher 1 Requested Start
    has_date: true
    has_time: true

input_button:
  load_optimizer_1_request_now:
    name: Dishwasher 1 Request Start Now
    icon: mdi:play-circle

  load_optimizer_1_request_soon:
    name: Dishwasher 1 Request Start Soon
    icon: mdi:clock-fast

  load_optimizer_1_request_overnight:
    name: Dishwasher 1 Request Overnight
    icon: mdi:weather-night

  load_optimizer_1_cancel_schedule:
    name: Dishwasher 1 Cancel Schedule
    icon: mdi:cancel

automation:
  - id: load_optimizer_1_capture_user_request
    alias: Load Optimizer 1 - Capture User Request
    description: Store a dishwasher run request from dashboard, voice, or automation controls.
    mode: queued
    triggers:
      - trigger: state
        entity_id: input_button.load_optimizer_1_request_now
        id: now
      - trigger: state
        entity_id: input_button.load_optimizer_1_request_soon
        id: soon
      - trigger: state
        entity_id: input_button.load_optimizer_1_request_overnight
        id: overnight
    variables:
      requested_mode: "{{ trigger.id }}"
      recommendation_entity: "{{ 'sensor.load_optimizer_1_' ~ trigger.id ~ '_recommendation' }}"
      recommendation_status: "{{ state_attr(recommendation_entity, 'status') }}"
      recommendation_program: >-
        {{ state_attr(recommendation_entity, 'program') or states(recommendation_entity) }}
      recommendation_start: "{{ state_attr(recommendation_entity, 'start') }}"
      message: >-
        Dishwasher {{ requested_mode }} request captured:
        {{ recommendation_program }} at {{ recommendation_start }}.
    actions:
      - condition: template
        value_template: >-
          {{ recommendation_status == 'ready'
             and recommendation_program not in ['unknown', 'unavailable', 'none', None, '']
             and recommendation_start not in ['unknown', 'unavailable', 'none', None, ''] }}
      - action: input_select.select_option
        target:
          entity_id: input_select.load_optimizer_1_requested_mode
        data:
          option: "{{ requested_mode }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.load_optimizer_1_requested_program
        data:
          value: "{{ recommendation_program }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.load_optimizer_1_requested_start
        data:
          datetime: "{{ as_local(as_datetime(recommendation_start)).strftime('%Y-%m-%d %H:%M:%S') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.load_optimizer_1_scheduler_message
        data:
          value: "{{ message[:255] }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.announce_text
        data:
          value: "{{ message[:255] }}"
      - action: script.turn_on
        target:
          entity_id: script.load_optimizer_announce

  - id: load_optimizer_1_cancel_user_request
    alias: Load Optimizer 1 - Cancel User Request
    description: Clear the dishwasher scheduler helpers.
    mode: single
    triggers:
      - trigger: state
        entity_id: input_button.load_optimizer_1_cancel_schedule
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.load_optimizer_1_requested_mode
        data:
          option: none
      - action: input_text.set_value
        target:
          entity_id: input_text.load_optimizer_1_requested_program
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.announce_text
        data:
          value: Dishwasher schedule cancelled.
      - action: script.turn_on
        target:
          entity_id: script.load_optimizer_announce

  - id: load_optimizer_1_execute_user_request
    alias: Load Optimizer 1 - Execute User Request
    description: Start the Bosch dishwasher when the requested Load Optimizer recommendation is due.
    mode: single
    triggers:
      - trigger: time_pattern
        minutes: "/1"
      - trigger: state
        entity_id:
          - sensor.load_optimizer_1_now_recommendation
          - sensor.load_optimizer_1_soon_recommendation
          - sensor.load_optimizer_1_overnight_recommendation
          - input_select.load_optimizer_1_requested_mode
          - input_datetime.load_optimizer_1_requested_start
    variables:
      requested_mode: "{{ states('input_select.load_optimizer_1_requested_mode') }}"
      bosch_device_id: YOUR_BOSCH_DISHWASHER_DEVICE_ID
      bosch_power_switch: switch.bosch_406010547033018437_bsh_common_setting_powerstate
      bosch_program_select: select.bosch_406010547033018437_programs
      bosch_start_button: button.bosch_406010547033018437_start_pause
      bosch_selected_program_sensor: sensor.bosch_406010547033018437_selected_program
      bosch_power_state_sensor: sensor.bosch_406010547033018437_bsh_common_setting_powerstate
      bosch_connected_sensor: binary_sensor.bosch_406010547033018437_connected
      bosch_door_sensor: binary_sensor.bosch_406010547033018437_bsh_common_status_doorstate
      bosch_remote_control_sensor: binary_sensor.bosch_406010547033018437_bsh_common_status_remotecontrolactive
      bosch_remote_start_sensor: binary_sensor.bosch_406010547033018437_bsh_common_status_remotecontrolstartallowed
      bosch_operation_state_sensor: sensor.bosch_406010547033018437_bsh_common_status_operationstate
      recommendation_entity: >-
        {{ 'sensor.load_optimizer_1_' ~ requested_mode ~ '_recommendation'
           if requested_mode in ['now', 'soon', 'overnight']
           else '' }}
      recommendation_status: "{{ state_attr(recommendation_entity, 'status') }}"
      recommendation_program: >-
        {{ state_attr(recommendation_entity, 'program') or states(recommendation_entity) }}
      recommendation_start: "{{ state_attr(recommendation_entity, 'start') }}"
      recommendation_ready_to_start: "{{ state_attr(recommendation_entity, 'ready_to_start') }}"
      requested_program: "{{ states('input_text.load_optimizer_1_requested_program') }}"
      requested_start: "{{ states('input_datetime.load_optimizer_1_requested_start') }}"
      selected_program: >-
        {{ requested_program
           if requested_program not in ['unknown', 'unavailable', 'none', None, '']
           else recommendation_program }}
      selected_program_key: >-
        {% set program_map = {
          'Eco50': 'Dishcare.Dishwasher.Program.Eco50',
          'Auto2': 'Dishcare.Dishwasher.Program.Auto2',
          'Intensiv70': 'Dishcare.Dishwasher.Program.Intensiv70',
          'Quick65': 'Dishcare.Dishwasher.Program.Quick65',
          'Glas40': 'Dishcare.Dishwasher.Program.Glas40',
          'MachineCare': 'Dishcare.Dishwasher.Program.MachineCare',
          'PreRinse': 'Dishcare.Dishwasher.Program.PreRinse',
          'IntensivPower': 'Dishcare.Dishwasher.Program.IntensivPower',
          'MixedLoad': 'Dishcare.Dishwasher.Program.MixedLoad',
          'Quick45': 'Dishcare.Dishwasher.Program.Quick45',
          'QuickD': 'Dishcare.Dishwasher.Program.Quick45',
          'NightWash': 'Dishcare.Dishwasher.Program.NightWash',
          'Super60': 'Dishcare.Dishwasher.Program.Super60',
          'Kurz60': 'Dishcare.Dishwasher.Program.Kurz60'
        } %}
        {{ program_map.get(selected_program, selected_program) }}
      bosch_ready: >-
        {{ states(bosch_connected_sensor) == 'on'
           and states(bosch_door_sensor) == 'off'
           and states(bosch_remote_control_sensor) == 'on'
           and states(bosch_remote_start_sensor) == 'on' }}
      due_by_time: >-
        {{ recommendation_start not in ['unknown', 'unavailable', 'none', None, '']
           and now() >= as_datetime(recommendation_start) }}
      due_now: >-
        {{ requested_mode == 'now'
           and (recommendation_ready_to_start == true or due_by_time) }}
      due_scheduled: >-
        {{ requested_mode in ['soon', 'overnight'] and due_by_time }}
      start_message: >-
        Dishwasher start requested by Load Optimizer:
        {{ selected_program }}.
      not_ready_message: >-
        Dishwasher is not ready to start {{ selected_program }}.
        Connected={{ states(bosch_connected_sensor) }},
        door={{ states(bosch_door_sensor) }},
        remote control={{ states(bosch_remote_control_sensor) }},
        remote start={{ states(bosch_remote_start_sensor) }}.
      failed_message: >-
        Dishwasher start may have failed. Bosch did not report a running cycle
        after the start request for {{ selected_program }}
        using {{ selected_program_key }}.
        Power={{ states(bosch_power_switch) }},
        power state={{ states(bosch_power_state_sensor) }},
        selected={{ states(bosch_selected_program_sensor) }},
        operation={{ states(bosch_operation_state_sensor) }}.
      success_state: >-
        {{ states('sensor.load_optimizer_1_cycle_state') == 'running'
           or states(bosch_operation_state_sensor) == 'BSH.Common.EnumType.OperationState.Run' }}
    conditions:
      - condition: template
        value_template: "{{ requested_mode in ['now', 'soon', 'overnight'] }}"
      - condition: template
        value_template: "{{ recommendation_status == 'ready' }}"
      - condition: template
        value_template: "{{ selected_program not in ['unknown', 'unavailable', 'none', None, ''] }}"
      - condition: template
        value_template: "{{ states('sensor.load_optimizer_1_cycle_state') == 'idle' }}"
      - condition: template
        value_template: "{{ due_now or due_scheduled }}"
    actions:
      - action: input_text.set_value
        target:
          entity_id: input_text.announce_text
        data:
          value: "{{ start_message[:255] }}"
      - action: script.turn_on
        target:
          entity_id: script.load_optimizer_announce
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ not bosch_ready }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.announce_text
                data:
                  value: "{{ not_ready_message[:255] }}"
              - action: input_text.set_value
                target:
                  entity_id: input_text.load_optimizer_1_scheduler_message
                data:
                  value: "{{ not_ready_message[:255] }}"
              - action: script.turn_on
                target:
                  entity_id: script.load_optimizer_announce
        default:
          - action: switch.turn_on
            continue_on_error: true
            target:
              entity_id: switch.bosch_406010547033018437_bsh_common_setting_powerstate
          - delay:
              seconds: 15
          - action: select.select_option
            continue_on_error: true
            target:
              entity_id: select.bosch_406010547033018437_programs
            data:
              option: "{{ selected_program_key }}"
          - delay:
              seconds: 5
          - action: button.press
            continue_on_error: true
            target:
              entity_id: button.bosch_406010547033018437_start_pause
          - delay:
              seconds: 20
          - if:
              - condition: template
                value_template: "{{ not success_state }}"
            then:
              - action: home_connect_alt.start_program
                continue_on_error: true
                data:
                  validate: true
                  device_id: "{{ bosch_device_id }}"
                  program_key: "{{ selected_program_key }}"
          - delay:
              minutes: 2
          - if:
              - condition: template
                value_template: "{{ not success_state }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: input_text.announce_text
                data:
                  value: "{{ failed_message[:255] }}"
              - action: input_text.set_value
                target:
                  entity_id: input_text.load_optimizer_1_scheduler_message
                data:
                  value: "{{ failed_message[:255] }}"
              - action: script.turn_on
                target:
                  entity_id: script.load_optimizer_announce
      - action: input_select.select_option
        target:
          entity_id: input_select.load_optimizer_1_requested_mode
        data:
          option: none
      - action: input_text.set_value
        target:
          entity_id: input_text.load_optimizer_1_requested_program
        data:
          value: ""
