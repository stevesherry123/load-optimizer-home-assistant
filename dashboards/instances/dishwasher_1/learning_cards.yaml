type: vertical-stack
cards:
  - type: entities
    title: Dishwasher Learning Status
    show_header_toggle: false
    entities:
      - entity: input_text.dishwasher_learning_summary
        name: Latest Learning Summary
      - entity: input_text.dishwasher_learning_database
        name: Learning Database
      - entity: input_number.dishwasher_total_runs
        name: Total Learned Runs
      - entity: input_text.dishwasher_last_program
        name: Last Program
      - entity: input_datetime.dishwasher_last_finish
        name: Last Finish
      - entity: input_number.dishwasher_peak_power
        name: Peak Power (W)

  - type: entities
    title: Last Learned Cycle
    show_header_toggle: false
    entities:
      - entity: input_text.dishwasher_last_program
      - entity: input_number.dishwasher_last_runtime_minutes
      - entity: input_number.dishwasher_last_energy_kwh
      - entity: input_number.dishwasher_peak_power
      - entity: input_datetime.dishwasher_last_finish

  - type: entities
    title: Current Program Prediction
    show_header_toggle: false
    entities:
      - entity: sensor.dishwasher_selected_program
        name: Selected Program
      - entity: input_number.dishwasher_expected_runtime
        name: Learned Runtime
      - entity: input_number.dishwasher_expected_energy
        name: Learned Energy

  - type: entities
    title: Profile Capture
    show_header_toggle: false
    entities:
      - entity: input_text.dishwasher_profile_sample
        name: Latest Sample
      - entity: input_text.dishwasher_cycle_profile
        name: Current Cycle Profile
