type: vertical-stack
cards:
  - type: entities
    title: Washing Machine Learning
    show_header_toggle: false
    entities:
      - type: section
        label: Learning Status
      - entity: input_boolean.washing_machine_learning_active
      - entity: input_number.washing_machine_inactive_minutes
      - entity: input_text.washing_machine_learning_summary
      - entity: input_text.washing_machine_learning_database
      - type: section
        label: Classification
      - entity: input_text.washing_machine_last_program
      - entity: input_text.washing_machine_last_classification_reason
      - type: section
        label: Last Run
      - entity: input_number.washing_machine_last_runtime_minutes
      - entity: input_number.washing_machine_last_energy_kwh
      - entity: input_number.washing_machine_peak_power
      - entity: input_datetime.washing_machine_last_finish
      - type: section
        label: Current Cycle
      - entity: input_datetime.washing_machine_cycle_start
      - entity: input_datetime.washing_machine_last_active
      - entity: input_number.washing_machine_cycle_start_energy
      - type: section
        label: Live Profile Capture
      - entity: input_text.washing_machine_profile_sample
      - entity: input_text.washing_machine_cycle_profile
      - type: section
        label: Learned Profiles (Future)
      - entity: input_text.washing_machine_profile_spin
      - entity: input_text.washing_machine_profile_wash
      - entity: input_text.washing_machine_profile_unknown
      - type: section
        label: Statistics
      - entity: input_number.washing_machine_total_runs
      - type: section
        label: Raw Sensors
      - entity: sensor.washing_machine_current_consumption
      - entity: sensor.washing_machine_today_s_consumption
      - entity: sensor.washing_machine_voltage
      - entity: sensor.washing_machine_current
      - entity: switch.washing_machine

  - type: custom:apexcharts-card
    graph_span: 20min
    span:
      start: minute
    header:
      show: true
      title: Washing Machine Profile
    apex_config:
      stroke:
        curve: smooth
        width: 2
      xaxis:
        tickAmount: 10
        labels:
          show: true
    series:
      - entity: input_text.washing_machine_cycle_profile
        name: Power
        data_generator: |
          const values = entity.state
            .split(";")
            .map(v => Number(v.trim()));

          return values.map((value, index) => [
            Date.now() + (index * 60000),
            value
          ]);
